name: 'olist'
version: '1.0.0'
config-version: 2

# Which profile (connection settings) this project uses — see profiles.yml
profile: 'olist'

# Where dbt looks for each type of file
model-paths: ["models"]
test-paths: ["tests"]
seed-paths: ["seeds"]
macro-paths: ["macros"]

# Default materializations per layer:
#   staging & intermediate -> views (cheap, always fresh, no storage)
#   marts -> tables (materialized once, fast to query in the dashboard)
models:
  olist:
    staging:
      +materialized: view
    intermediate:
      +materialized: view
    marts:
      +materialized: table
